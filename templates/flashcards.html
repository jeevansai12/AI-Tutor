{% extends 'base.html' %}
{% block title %}{{ subject_display }} Flashcards — AI Tutor{% endblock %}
{% block content %}
<div style="max-width: 600px; margin: 2rem auto; text-align: center;">
    <h1 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem;">{{ subject_display }} Flashcards</h1>
    <p class="text-muted" style="margin-bottom: 2rem;">Click on a card to flip it.</p>
    
    <div style="display: flex; flex-direction: column; gap: 1.5rem;">
        {% for card in cards %}
        <div class="flashcard-container" style="perspective: 1000px; height: 150px; cursor: pointer;" onclick="this.querySelector('.flashcard-inner').style.transform = this.querySelector('.flashcard-inner').style.transform === 'rotateY(180deg)' ? '' : 'rotateY(180deg)';">
            <div class="flashcard-inner" style="position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d;">
                <div class="flashcard-front card" style="position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; margin: 0;">
                    <h3 style="margin: 0;">{{ card.question }}</h3>
                </div>
                <div class="flashcard-back card" style="position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; transform: rotateY(180deg); background: var(--bg-secondary); border-color: var(--accent); margin: 0;">
                    <p style="margin: 0; padding: 1rem; overflow-y: auto;">{{ card.answer }}</p>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
    <div style="margin-top: 2rem;">
        <a href="{% url 'flashcard_select' %}" class="btn btn-outline">Back to Subjects</a>
    </div>
</div>
{% endblock %}
