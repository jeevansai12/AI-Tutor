{% extends 'base.html' %}

{% block title %}Select Quiz — AI Tutor{% endblock %}

{% block content %}
<h1 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem;">📝 Take a Quiz</h1>
<p class="text-muted" style="margin-bottom: 2rem;">Choose a subject to test your knowledge.</p>

<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem;">
    {% for code, name in subjects %}
    <a href="{% url 'quiz_take' code %}" class="card" style="text-decoration: none; text-align: center; transition: transform 0.2s, border-color 0.2s;" onmouseover="this.style.borderColor='#6366f1'; this.style.transform='translateY(-3px)'" onmouseout="this.style.borderColor=''; this.style.transform=''">
        <h3 style="font-size: 1.1rem; color: var(--text-primary); margin-bottom: 0.3rem;">{{ name }}</h3>
        <p class="text-muted" style="font-size: 0.85rem;">Start Quiz →</p>
    </a>
    {% endfor %}
</div>
{% endblock %}
