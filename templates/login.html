{% extends 'base.html' %}

{% block title %}Login — AI Tutor{% endblock %}

{% block content %}
<div style="max-width: 480px; margin: 3rem auto;">
    <div class="card">
        <h1 style="font-size: 1.6rem; font-weight: 700; margin-bottom: 0.3rem;">Welcome Back</h1>
        <p class="text-muted" style="margin-bottom: 1.5rem;">Sign in to continue learning.</p>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" name="username" id="username" placeholder="Enter your username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">
                Sign In
            </button>
        </form>

        <p class="text-center mt-3 text-muted">
            Don't have an account? <a href="{% url 'register' %}">Register</a>
        </p>
    </div>
</div>
{% endblock %}
