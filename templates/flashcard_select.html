{% extends 'base.html' %}
{% block title %}Select Flashcard Subject — AI Tutor{% endblock %}
{% block content %}
<div style="max-width: 600px; margin: 2rem auto; text-align: center;">
    <h1 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem;">Flashcards</h1>
    <p class="text-muted" style="margin-bottom: 2rem;">Select a subject to review flashcards.</p>
    <div style="display: flex; flex-direction: column; gap: 1rem;">
        {% for code, name in subjects %}
        <a href="{% url 'flashcards' code %}" class="card" style="text-decoration: none; text-align: left; padding: 1.5rem; transition: transform 0.2s;" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform=''">
            <h3 style="color: var(--text-primary); margin: 0; font-size: 1.1rem;">{{ name }}</h3>
        </a>
        {% endfor %}
    </div>
</div>
{% endblock %}
